# @package _global_

defaults:
  - /dataset@_group_.re10k: re10k
  - override /model/encoder: nas3r-m
  - override /model/encoder/backbone: masked_croco_multi
  - override /model/decoder: splatting_cuda
  - override /loss: [mse, lpips]

wandb:
  name: re10k
  tags: [re10k, 256x256]
  project: nas3r-m


model:
  encoder:
    backbone:
      name: masked_croco_multi
      intrinsics_embed_loc: 'none'

    gs_params_head_type: dpt_gs
    pose_free: true
    pretrained_weights: ''

    estimating_focal: true 
    depth_activation: 'sigmoid'

    pose_head:
      pose_init_t: true
      use_homogeneous: false
      concat_enc: false
      estimate_focal: true



dataset:
  re10k:
    make_baseline_1: true
    view_sampler:
      warm_up_steps: 150_000
      num_target_views: 1
      num_context_views: 2
      initial_min_distance_between_context_views: 10 
      min_distance_between_context_views: 25 
      initial_max_distance_between_context_views: 10 
      max_distance_between_context_views: 90 

optimizer:
  lr: 5e-5
  warm_up_steps: 2000
  backbone_lr_multiplier: 0.1
  min_lr_multiplier: 0.01

data_loader:
  train:
    batch_size: 16

trainer:
  max_steps: 300_001
  val_check_interval: 10000

checkpointing:
  every_n_train_steps: 10000
  save_weights_only: false
  save_top_k: 1


train:
  training_context: false


test:
  output_path: outputs/test/nas3r-m/random/
  align_pose: false
  compute_scores: true
  save_image: true
  save_video: false
  save_compare: false